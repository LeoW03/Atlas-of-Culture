<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px; height: 1080px; overflow: hidden;
    background: #07070c; font-family: 'Inter', sans-serif; position: relative;
  }
  body::before {
    content: ''; position: absolute; inset: 0; z-index: 200; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.04;
  }

  .canvas {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
  }

  /* ── Title strip ── */
  .title-strip {
    padding: 52px 64px 0;
    flex-shrink: 0;
    position: relative; z-index: 10;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(232,197,71,0.65);
    margin-bottom: 14px;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 900; font-size: 52px; line-height: 1.05;
    letter-spacing: -0.01em; color: #f5f0e4;
    margin-bottom: 14px;
  }
  .headline .gold { color: #e8c547; font-style: italic; }
  .headline .blue { color: #5ab8d4; }

  .subhead {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: 16px; color: rgba(255,255,255,0.65);
    line-height: 1.55; margin-bottom: 30px;
    max-width: 820px;
  }
  .subhead strong { color: #fff; font-weight: 600; }

  /* ── Map fills rest ── */
  .map-zone { flex: 1; position: relative; overflow: hidden; min-height: 0; }
  #map-svg { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* ── Footer overlay on map ── */
  .map-footer {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
    padding: 40px 64px 36px;
    background: linear-gradient(to bottom, transparent 0%, rgba(7,7,12,0.92) 50%, rgba(7,7,12,1) 100%);
    display: flex; justify-content: space-between; align-items: flex-end;
  }

  .thread-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(232,197,71,0.45);
  }
  .footer-right { text-align: right; }
  .handle { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.22); letter-spacing: 0.1em; display: block; margin-bottom: 2px; }
  .source { font-family: 'Inter', sans-serif; font-size: 10px; color: rgba(255,255,255,0.18); }
</style>
</head>
<body>
<div class="canvas">
  <div class="title-strip">
    <div class="eyebrow">Health economics · 1 of 3</div>
    <div class="headline">
      Germany pays <span class="blue">$11</span>.<br/>
      The US pays <span class="gold">$98.70</span>.
    </div>
    <div class="subhead">
      The same insulin. Same molecule. Same manufacturer.<br/>
      <strong>The US pays 8× more than comparable wealthy nations.</strong>
    </div>
  </div>

  <div class="map-zone">
    <svg id="map-svg" viewBox="-40 33 984 340" preserveAspectRatio="xMidYMid slice">
      <rect x="-100" y="-100" width="1200" height="600" fill="#09091c"/>
      <g id="grat"></g>
      <g id="countries"></g>
    </svg>
    <div class="map-footer">
      <div class="thread-tag">Insulin price by country →</div>
      <div class="footer-right">
        <span class="handle">@atlasofculture</span>
        <span class="source">Data: RAND Corporation 2021</span>
      </div>
    </div>
  </div>
</div>

<script>
const PRICES = {
  "United States":98.70,"Germany":11.00,"Canada":12.00,"Japan":14.40,
  "United Kingdom":7.52,"France":9.08,"Australia":9.08,"Mexico":14.40,
  "Brazil":11.70,"China":5.20,"Pakistan":4.60,"India":4.76,
  "Sweden":10.50,"Norway":10.80,"Denmark":10.20,"Finland":10.40,
  "Netherlands":9.80,"Belgium":9.90,"Switzerland":11.20,"Austria":10.60,
  "Italy":10.10,"Spain":9.40,"Portugal":8.80,"Poland":7.20,"Czechia":7.80,
  "Hungary":7.50,"Romania":6.80,"Turkey":5.60,"Russia":5.40,"Ukraine":5.20,
  "South Korea":12.80,"Taiwan":8.60,"Thailand":6.40,"Indonesia":5.80,
  "Philippines":6.20,"Malaysia":6.80,"Vietnam":5.40,"Bangladesh":4.80,
  "Sri Lanka":5.10,"Nepal":4.90,"South Africa":8.20,"Nigeria":5.60,
  "Kenya":5.40,"Egypt":5.20,"Morocco":5.80,"Argentina":7.60,"Chile":8.40,
  "Colombia":7.20,"Peru":6.80,"New Zealand":9.20,"Saudi Arabia":8.80,
  "Israel":10.40,"Iran":4.90,"Kazakhstan":5.40,"Greece":9.20,"Ireland":10.80,
};
const NM = {"United States of America":"United States","Türkiye":"Turkey","Czech Republic":"Czechia","S. Korea":"South Korea","Dem. Rep. Congo":"Democratic Republic of the Congo","N. Macedonia":"North Macedonia","eSwatini":"Eswatini","Dominican Rep.":"Dominican Republic","Bosnia and Herz.":"Bosnia and Herzegovina","Somaliland":"Somalia","N. Cyprus":"Cyprus"};
const STOPS=[[0.00,[28,55,115]],[0.18,[38,95,135]],[0.35,[52,125,115]],[0.50,[85,125,75]],[0.65,[145,115,38]],[0.80,[192,138,28]],[0.92,[218,175,48]],[1.00,[232,197,71]]];
function getColor(v){const t=Math.sqrt(Math.max(0,Math.min(1,(v-4)/94.7)));let lo=STOPS[0],hi=STOPS[STOPS.length-1];for(let i=0;i<STOPS.length-1;i++){if(t>=STOPS[i][0]&&t<=STOPS[i+1][0]){lo=STOPS[i];hi=STOPS[i+1];break;}}const s=hi[0]===lo[0]?0:(t-lo[0])/(hi[0]-lo[0]);return`rgb(${[0,1,2].map(i=>Math.round(lo[1][i]+s*(hi[1][i]-lo[1][i]))).join(',')})`;}
function lookup(n){return PRICES[n]??PRICES[NM[n]]??null;}
const W=944,H=490;
function proj(lon,lat){return[((lon+180)/360)*W,((90-lat)/180)*H];}
function r2p(ring){const T=W*0.4,segs=[[]];ring.forEach(([lo,la])=>{const[x,y]=proj(lo,la);const s=segs[segs.length-1];if(s.length>0&&Math.abs(x-s[s.length-1][0])>T)segs.push([[x,y]]);else s.push([x,y]);});return segs.filter(s=>s.length>1).map(s=>s.map(([x,y],i)=>`${i?'L':'M'}${x.toFixed(1)},${y.toFixed(1)}`).join('')+'Z').join(' ');}
function g2p(g){if(g.type==='Polygon')return g.coordinates.map(r2p).join(' ');if(g.type==='MultiPolygon')return g.coordinates.map(p=>p.map(r2p).join(' ')).join(' ');return'';}
const grat=document.getElementById('grat');
[-60,-30,0,30,60].forEach(lat=>{const[,y]=proj(0,lat);const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',0);l.setAttribute('y1',y);l.setAttribute('x2',W);l.setAttribute('y2',y);l.setAttribute('stroke','#1a1a40');l.setAttribute('stroke-width','0.5');grat.appendChild(l);});
fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
.then(r=>r.json()).then(geo=>{
  const el=document.getElementById('countries');
  const sorted=[...geo.features].sort((a,b)=>{const pa=lookup(a.properties.name||'');const pb=lookup(b.properties.name||'');if(pa===null&&pb===null)return 0;if(pa===null)return-1;if(pb===null)return 1;return pa-pb;});
  sorted.forEach(f=>{const name=f.properties.name||'';const price=lookup(name);const d=g2p(f.geometry);if(!d)return;const path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d',d);path.setAttribute('fill',price!==null?getColor(price):'#111128');path.setAttribute('stroke','#07070c');path.setAttribute('stroke-width','0.4');el.appendChild(path);});
  // Labels
  const ann=document.createElementNS('http://www.w3.org/2000/svg','g');
  // US label moved east to avoid left-edge crop under slice
  [{lon:-88,lat:38,text:'$98.70',gold:true},{lon:68,lat:30,text:'$4.60',gold:false}].forEach(({lon,lat,text,gold})=>{
    const[x,y]=proj(lon,lat);
    const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
    const tw=text.length*6.8+12;bg.setAttribute('x',x-tw/2);bg.setAttribute('y',y-14);bg.setAttribute('width',tw);bg.setAttribute('height',15);bg.setAttribute('rx',2);bg.setAttribute('fill',gold?'rgba(10,8,0,0.88)':'rgba(8,8,22,0.82)');ann.appendChild(bg);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',x);t.setAttribute('y',y-3);t.setAttribute('text-anchor','middle');t.setAttribute('font-family','IBM Plex Mono,monospace');t.setAttribute('font-size','11');t.setAttribute('font-weight','500');t.setAttribute('fill',gold?'#e8c547':'rgba(255,255,255,0.75)');t.textContent=text;ann.appendChild(t);
  });
  el.appendChild(ann);
});
</script>
</body>
</html>
