<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px; height: 1080px; overflow: hidden;
    background: #07070c; font-family: 'Inter', sans-serif; position: relative;
  }
  body::before {
    content: ''; position: absolute; inset: 0; z-index: 200; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.04;
  }

  .canvas {
    position: absolute; inset: 0;
    padding: 58px 72px 52px;
    display: flex; flex-direction: column;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(232,197,71,0.65); margin-bottom: 16px; flex-shrink: 0;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-weight: 700; font-size: 36px; color: #f0ece0;
    line-height: 1.1; margin-bottom: 8px; flex-shrink: 0;
  }
  .section-title em { font-style: italic; color: #e8c547; }

  .section-sub {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: 15px; color: rgba(255,255,255,0.55);
    line-height: 1.5; margin-bottom: 36px; flex-shrink: 0;
  }

  /* Bar chart — fills remaining space */
  .chart { flex: 1; display: flex; flex-direction: column; min-height: 0; }

  .chart-header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    padding-left: 130px; margin-bottom: 14px; flex-shrink: 0;
  }

  .rows { flex: 1; display: flex; flex-direction: column; }

  .row { display: flex; align-items: center; flex: 1; }

  .country {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; letter-spacing: 0.04em;
    width: 122px; flex-shrink: 0;
    text-align: right; padding-right: 16px;
    color: rgba(255,255,255,0.45);
  }
  .row.us .country { color: #e8c547; font-size: 13px; }

  .track {
    flex: 1; height: 28px;
    background: rgba(255,255,255,0.04);
    border-radius: 2px; overflow: hidden; position: relative;
  }
  .row.us .track { height: 34px; }

  .fill { height: 100%; border-radius: 2px; }
  .row.us .fill {
    background: linear-gradient(90deg, #9a7012 0%, #c89820 35%, #e8c547 78%, #f0d560 100%);
    box-shadow: 0 0 24px rgba(232,197,71,0.2);
  }
  .row:not(.us) .fill {
    background: linear-gradient(90deg, #142232 0%, #1e4460 50%, #2e6888 100%);
  }

  .multiplier {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-family: 'IBM Plex Mono', monospace; font-size: 9.5px;
    letter-spacing: 0.06em; color: rgba(232,197,71,0.55); white-space: nowrap;
  }

  .val {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    padding-left: 12px; width: 58px; flex-shrink: 0;
    color: rgba(255,255,255,0.38);
  }
  .row.us .val { color: rgba(232,197,71,0.7); font-size: 13px; }

  .sep { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 0 0 0 122px; flex-shrink: 0; height: 1px; }

  .footer {
    flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 16px; margin-top: 16px;
    display: flex; justify-content: space-between; align-items: center;
  }

  .thread-tag {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(232,197,71,0.45);
  }
  .footer-right { text-align: right; }
  .handle { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.22); letter-spacing: 0.1em; }
  .source-txt { font-family: 'Inter', sans-serif; font-size: 9px; color: rgba(255,255,255,0.16); display: block; }
</style>
</head>
<body>
<div class="canvas">
  <div class="eyebrow">2 of 3 · The peer comparison</div>
  <div class="section-title">The outlier isn't poverty.<br/>It's <em>policy</em>.</div>
  <div class="section-sub">Every country below negotiates drug prices. The US doesn't. That's the entire gap.</div>

  <div class="chart">
    <div class="chart-header">Retail price · standard insulin vial (USD)</div>
    <div class="rows" id="rows"></div>
  </div>

  <div class="footer">
    <div class="thread-tag">← The map · The history →</div>
    <div class="footer-right">
      <span class="handle">@atlasofculture</span>
      <span class="source-txt">RAND Corporation / Health Affairs 2021</span>
    </div>
  </div>
</div>

<script>
const DATA = [
  {c:'USA',      p:98.70, us:true},
  null,
  {c:'Japan',    p:14.40, mult:'7×'},
  {c:'Canada',   p:12.00, mult:'8×'},
  {c:'Germany',  p:11.00, mult:'9×'},
  {c:'France',   p: 9.08, mult:'11×'},
  {c:'UK',       p: 7.52, mult:'13×'},
  {c:'India',    p: 4.76, mult:'21×'},
  {c:'Pakistan', p: 4.60, mult:'21×'},
];
const MAX=98.70;
const rows=document.getElementById('rows');
DATA.forEach(d=>{
  if(d===null){const sep=document.createElement('div');sep.className='sep';rows.appendChild(sep);return;}
  const row=document.createElement('div');
  row.className='row'+(d.us?' us':'');
  row.innerHTML=`
    <div class="country">${d.c}</div>
    <div class="track">
      <div class="fill" style="width:${(d.p/MAX*100).toFixed(1)}%"></div>
      ${d.mult?`<div class="multiplier">← ${d.mult} cheaper than USA</div>`:''}
    </div>
    <div class="val">$${d.p.toFixed(2)}</div>
  `;
  rows.appendChild(row);
});
</script>
</body>
</html>
